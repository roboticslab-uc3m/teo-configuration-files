[devCan softNeckBus]
device "CanBusControlboard"
description "CAN bus wrapper for TEO's soft neck"
buses ("socket-rightArm")
socket-rightArm ("id01-ipos" "id02-ipos" "id03-ipos")
syncPeriod 0.02

[mapper softNeckMapper]
device "controlboardremapper"
joints 3
networks ("softNeckBus")
softNeckBus (0 2 0 2)
calibrator "generic"

[wrapper softNeckPort]
device "controlBoard_nws_yarp"
name "/softNeck"
period 0.01
